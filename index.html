<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Compras</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <div class="container">

    <button onclick="alternarTema()" id="temaBtn">🌙 Modo Dark</button>

    <h1>🛒 Sistema de Compras</h1>

    <div class="form">
      <input type="text" id="nome" placeholder="Nome do produto">
      <input type="number" id="valor" placeholder="Valor unitário">
      <input type="number" id="qtd" placeholder="Quantidade">
      <button onclick="adicionarProduto()">Salvar Produto</button>
    </div>

    <p id="mensagem"></p>

    <h2>Produtos:</h2>
    <ul id="lista"></ul>

    <h2>Total: R$ <span id="total">0.00</span></h2>

    <h3>Forma de pagamento:</h3>
    <select id="pagamento">
      <option value="0">À vista</option>
      <option value="1">Cartão</option>
    </select>

    <button onclick="finalizarCompra()">Finalizar Compra</button>

    <h2 id="resultado"></h2>

  </div>

  <script src="script.js"></script>
</body>
</html>
